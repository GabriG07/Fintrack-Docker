server {
    listen 80;

    # Serve os arquivos estáticos do React
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html; # Redireciona qualquer rota para o index.html (necessário para React Router)
    }

    # Proxy reverso: redireciona chamadas /api para o container "backend"
    # O nginx acessa o backend pelo nome do container, não pelo localhost
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
